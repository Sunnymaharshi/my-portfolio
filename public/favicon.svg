  <circle cx="32" cy="32" r="15" fill="url(#planet)"/>
  <!-- sparkle -->
  <path d="M49 14 l1.7 4.3 4.3 1.7 -4.3 1.7 -1.7 4.3 -1.7 -4.3 -4.3 -1.7 4.3 -1.7 z" fill="#eaf4ff"/>
