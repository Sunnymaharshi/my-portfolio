<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="planet" cx="38%" cy="32%" r="70%">
      <stop offset="0%" stop-color="#c8deff"/>
      <stop offset="40%" stop-color="#4a90d9"/>
      <stop offset="100%" stop-color="#0d1c3a"/>
    </radialGradient>
    <radialGradient id="atmo" cx="50%" cy="50%" r="50%">
      <stop offset="70%" stop-color="#4a90d9" stop-opacity="0"/>
      <stop offset="100%" stop-color="#7bb3f0" stop-opacity="0.5"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="1.5" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <!-- atmosphere glow -->
  <circle cx="32" cy="32" r="20" fill="url(#atmo)"/>

  <!-- ring back half -->
  <ellipse cx="32" cy="34" rx="26" ry="7" fill="none"
           stroke="#7bb3f0" stroke-width="2" opacity="0.5"
           stroke-dasharray="41 41" stroke-dashoffset="0"
           transform="rotate(-18 32 34)"/>

  <!-- planet -->
  <circle cx="32" cy="32" r="16" fill="url(#planet)" filter="url(#glow)"/>

  <!-- ring front half -->
  <ellipse cx="32" cy="34" rx="26" ry="7" fill="none"
           stroke="#c8deff" stroke-width="2" opacity="0.7"
           stroke-dasharray="41 41" stroke-dashoffset="41"
           transform="rotate(-18 32 34)"/>

  <!-- sparkle top-right -->
  <path d="M50 11 l1.4 3.6 3.6 1.4 -3.6 1.4 -1.4 3.6 -1.4 -3.6 -3.6 -1.4 3.6 -1.4 z"
        fill="#eaf4ff" opacity="0.9"/>

  <!-- tiny star bottom-left -->
  <circle cx="14" cy="50" r="1.2" fill="#7bb3f0" opacity="0.7"/>
</svg>
