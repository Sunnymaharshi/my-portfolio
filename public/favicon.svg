<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <radialGradient id="planet" cx="40%" cy="34%" r="78%">
      <stop offset="0%" stop-color="#9fc4f0"/>
      <stop offset="50%" stop-color="#3a6abf"/>
      <stop offset="100%" stop-color="#0d1c3a"/>
    </radialGradient>
  </defs>
  <rect width="64" height="64" rx="14" fill="#050d1a"/>
